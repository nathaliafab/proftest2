services:
  server:
    build: ./server
    container_name: sistema-server
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/src
      - ./server/data:/app/data   # persistência JSON fora do container
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATA_DIR=/app/data
    command: npm run dev

  server-tests:
    build: ./server
    container_name: sistema-server-tests
    environment:
      - NODE_ENV=test
      - PORT=3001
      - DATA_DIR=/app/test-data
    volumes:
      - server_test_data:/app/test-data
    command: npm run dev

  client:
    build: ./client
    container_name: sistema-client
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - server
    command: npm start

  tests:
    build: ./tests
    container_name: sistema-tests
    depends_on:
      - server-tests
    environment:
      - API_URL=http://server-tests:3001
      - BASE_URL=http://client:3000
    command: npm test

volumes:
  server_test_data: